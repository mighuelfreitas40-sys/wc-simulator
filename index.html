<style>
:root {
  --bg:#0a0e1a;--bg-card:#0d1321;--bg-card-hover:#111b2e;--border:#1a2a4a;
  --cyan:#00d4ff;--cyan-dim:#00a8cc;--green:#00ff88;--green-dim:#00cc6a;
  --red:#ff3366;--red-dim:#cc2952;--yellow:#ffcc00;--yellow-dim:#ccaa00;
  --purple:#b347ff;--text:#e0e8f0;--text-dim:#6b7a8f;--text-dark:#3a4a5f;
}
* {margin:0;padding:0;box-sizing:border-box}
body {
  font-family:'JetBrains Mono',monospace;
  background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
}
body::before {
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}
body::after {
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);
  pointer-events:none;z-index:10000;opacity:0.3;
}
.main-container {position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:20px}
.header {text-align:center;padding:30px 20px;border-bottom:1px solid var(--border);margin-bottom:30px;position:relative}
.header::before {
  content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:300px;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),var(--cyan),transparent);
  box-shadow:0 0 20px rgba(0,212,255,0.3),0 0 40px rgba(0,212,255,0.1);
}
.header h1 {
  font-family:'Orbitron',sans-serif;font-size:2.8rem;font-weight:900;letter-spacing:8px;
  background:linear-gradient(135deg,var(--cyan),var(--green),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;
}
.header .subtitle {font-size:0.85rem;color:var(--text-dim);letter-spacing:4px;text-transform:uppercase}
.header .year-display {font-family:'Orbitron',sans-serif;font-size:1.2rem;color:var(--green);margin-top:15px;letter-spacing:6px;text-shadow:0 0 20px rgba(0,255,136,0.3)}
.header .year-display span {color:var(--text-dim)}
.controls {display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap}
.btn {
  font-family:'JetBrains Mono',monospace;font-size:0.8rem;font-weight:600;padding:12px 28px;
  border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;
  text-transform:uppercase;letter-spacing:2px;transition:all 0.3s ease;position:relative;overflow:hidden;
}
.btn::before {content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.1),transparent);transition:left 0.5s ease}
.btn:hover::before {left:100%}
.btn:hover {border-color:var(--cyan);box-shadow:0 0 20px rgba(0,212,255,0.3),0 0 40px rgba(0,212,255,0.1);transform:translateY(-2px)}
.btn-primary {border-color:var(--cyan);color:var(--cyan)}
.btn-primary:hover {background:rgba(0,212,255,0.1)}
.btn-sim {border-color:var(--green);color:var(--green)}
.btn-sim:hover {background:rgba(0,255,136,0.1);box-shadow:0 0 20px rgba(0,255,136,0.3),0 0 40px rgba(0,255,136,0.1)}
.btn-reset {border-color:var(--red);color:var(--red)}
.btn-reset:hover {background:rgba(255,51,102,0.1);box-shadow:0 0 20px rgba(255,51,102,0.3),0 0 40px rgba(255,51,102,0.1)}
.btn:disabled {opacity:0.4;cursor:not-allowed;border-color:var(--text-dark);color:var(--text-dark)}
.btn:disabled:hover {box-shadow:none;transform:none}
.sim-log-container {display:none;max-width:900px;margin:0 auto 30px;border:1px solid var(--border);background:var(--bg-card);max-height:300px;overflow-y:auto}
.sim-log-container.active {display:block}
.sim-log-header {padding:10px 15px;background:rgba(0,212,255,0.05);border-bottom:1px solid var(--border);font-size:0.75rem;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.sim-log {padding:15px;font-size:0.75rem;line-height:1.8;color:var(--text-dim)}
.sim-log .log-entry {margin-bottom:4px;padding-left:15px;position:relative}
.sim-log .log-entry::before {content:'>';position:absolute;left:0;color:var(--cyan)}
.sim-log .log-entry.highlight {color:var(--green)}
.sim-log .log-entry.winner {color:var(--yellow);font-weight:700}
.sim-log .log-entry.goal {color:var(--text)}
.bracket-wrapper {display:flex;justify-content:center;gap:0;overflow-x:auto;padding-bottom:20px}
.bracket-column {display:flex;flex-direction:column;justify-content:space-around;min-width:220px;padding:0 10px}
.bracket-column-title {text-align:center;font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:600;color:var(--cyan);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;padding:8px;border:1px solid var(--border);background:rgba(0,212,255,0.05)}
.match-card {background:var(--bg-card);border:1px solid var(--border);margin-bottom:15px;transition:all 0.3s ease;position:relative}
.match-card:hover {border-color:var(--cyan);box-shadow:0 0 20px rgba(0,212,255,0.3),0 0 40px rgba(0,212,255,0.1)}
.match-card.simulated {border-color:var(--green);box-shadow:0 0 20px rgba(0,255,136,0.3),0 0 40px rgba(0,255,136,0.1)}
.match-number {font-size:0.6rem;color:var(--text-dark);padding:4px 8px;border-bottom:1px solid var(--border);letter-spacing:1px}
.team-row {display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid rgba(26,42,74,0.5);cursor:pointer;transition:background 0.2s ease}
.team-row:last-child {border-bottom:none}
.team-row:hover {background:var(--bg-card-hover)}
.team-row.winner {background:rgba(0,255,136,0.05)}
.team-flag {width:24px;height:16px;margin-right:10px;border-radius:2px;object-fit:cover;border:1px solid rgba(255,255,255,0.1)}
.team-name {flex:1;font-size:0.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-score {font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;min-width:28px;text-align:center;color:var(--text-dim)}
.team-row.winner .team-score {color:var(--green);text-shadow:0 0 20px rgba(0,255,136,0.3),0 0 40px rgba(0,255,136,0.1)}
.team-row.loser .team-score {color:var(--text-dark)}
.match-date {font-size:0.6rem;color:var(--text-dark);padding:4px 8px;text-align:center;border-top:1px solid var(--border);letter-spacing:1px}
.match-goals {font-size:0.6rem;color:var(--text-dark);padding:2px 8px;text-align:center;max-height:0;overflow:hidden;transition:max-height 0.3s ease,padding 0.3s ease}
.match-card:hover .match-goals,.match-card.simulated .match-goals {max-height:100px;padding:4px 8px}
.goal-scorer {display:inline-block;margin:1px 4px;color:var(--yellow-dim)}
.connector-container {display:flex;flex-direction:column;justify-content:space-around;width:30px;position:relative}
.connector {height:2px;background:var(--border);position:relative}
.connector::after {content:'';position:absolute;right:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--border)}
.connector.active {background:var(--green);box-shadow:0 0 20px rgba(0,255,136,0.3),0 0 40px rgba(0,255,136,0.1)}
.connector.active::after {background:var(--green);box-shadow:0 0 20px rgba(0,255,136,0.3),0 0 40px rgba(0,255,136,0.1)}
.final-center {display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:200px;padding:0 15px}
.trophy-icon {font-size:3rem;margin-bottom:15px;color:var(--yellow);text-shadow:0 0 30px rgba(255,204,0,0.4);animation:pulse 2s ease-in-out infinite}
@keyframes pulse {0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.final-label {font-family:'Orbitron',sans-serif;font-size:0.8rem;color:var(--yellow);letter-spacing:4px;margin-bottom:15px;text-shadow:0 0 10px rgba(255,204,0,0.3)}
.final-match {width:100%}
.champion-display {display:none;text-align:center;padding:30px;border:2px solid var(--yellow);background:rgba(255,204,0,0.05);margin-top:20px;animation:championGlow 2s ease-in-out infinite alternate}
.champion-display.active {display:block}
@keyframes championGlow {from{box-shadow:0 0 20px rgba(255,204,0,0.1)}to{box-shadow:0 0 40px rgba(255,204,0,0.3)}}
.champion-display .champion-title {font-family:'Orbitron',sans-serif;font-size:1.5rem;color:var(--yellow);letter-spacing:4px;margin-bottom:15px}
.champion-display .champion-flag {width:80px;height:50px;border-radius:4px;margin-bottom:10px;border:2px solid var(--yellow);box-shadow:0 0 20px rgba(255,204,0,0.3)}
.champion-display .champion-name {font-size:1.3rem;font-weight:700;color:var(--yellow);margin-bottom:5px}
.champion-display .champion-stats {font-size:0.75rem;color:var(--text-dim)}
.stats-panel {display:none;max-width:900px;margin:30px auto;border:1px solid var(--border);background:var(--bg-card)}
.stats-panel.active {display:block}
.stats-header {padding:15px 20px;background:rgba(0,212,255,0.05);border-bottom:1px solid var(--border);font-family:'Orbitron',sans-serif;font-size:0.85rem;color:var(--cyan);letter-spacing:3px;text-transform:uppercase}
.stats-grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1px;background:var(--border)}
.stat-item {background:var(--bg-card);padding:15px 20px}
.stat-label {font-size:0.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.stat-value {font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:700;color:var(--cyan)}
.stat-value.green {color:var(--green)}
.stat-value.yellow {color:var(--yellow)}
.stat-value.red {color:var(--red)}
.loading-overlay {display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,14,26,0.95);z-index:9999;justify-content:center;align-items:center;flex-direction:column}
.loading-overlay.active {display:flex}
.loading-text {font-family:'Orbitron',sans-serif;font-size:1.2rem;color:var(--cyan);letter-spacing:4px;margin-bottom:20px}
.loading-bar {width:300px;height:3px;background:var(--border);position:relative;overflow:hidden}
.loading-bar::after {content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent);animation:loadingSlide 1.5s ease-in-out infinite}
@keyframes loadingSlide {0%{left:-100%}100%{left:100%}}
.team-tooltip {position:fixed;background:var(--bg-card);border:1px solid var(--cyan);padding:15px;max-width:280px;z-index:1000;display:none;font-size:0.75rem;line-height:1.6;box-shadow:0 0 20px rgba(0,212,255,0.3),0 0 40px rgba(0,212,255,0.1)}
.team-tooltip.active {display:block}
.tooltip-title {font-family:'Orbitron',sans-serif;font-size:0.85rem;color:var(--cyan);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.tooltip-stat {display:flex;justify-content:space-between;margin-bottom:3px}
.tooltip-stat-label {color:var(--text-dim)}
.tooltip-stat-value {color:var(--text);font-weight:600}
.tooltip-players {margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.tooltip-players-title {color:var(--green);margin-bottom:4px}
@media (max-width:1200px) {.bracket-wrapper{flex-direction:column;align-items:center}.bracket-column{min-width:300px}.connector-container{display:none}}
@media (max-width:600px) {.header h1{font-size:1.8rem;letter-spacing:4px}.bracket-column{min-width:100%;padding:0 5px}.controls{flex-direction:column;align-items:center}.btn{width:250px}}
::-webkit-scrollbar {width:6px}
::-webkit-scrollbar-track {background:var(--bg)}
::-webkit-scrollbar-thumb {background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover {background:var(--cyan)}
.fade-in {animation:fadeIn 0.5s ease forwards}
@keyframes fadeIn {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.score-pop {animation:scorePop 0.3s ease}
@keyframes scorePop {0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
</style>
</head>

function calculateTeamPower(teamName){
const team=TEAMS_DATA[teamName];if(!team)return 50;
let power=team.squadStrength*0.35;
const rankingScore=Math.max(0,(100-team.ranking)/100*100);
power+=rankingScore*0.15;
const oddsScore=Math.max(0,(200-team.odds)/200*100);
power+=oddsScore*0.15;
let formScore=0;team.form.forEach(r=>{if(r==="V")formScore+=20;else if(r==="E")formScore+=10;else formScore+=5;});
power+=(formScore/5)*0.10;
const attackScore=(team.attack+team.goalsInWC*3)/2;
power+=Math.min(attackScore,100)*0.10;
const defenseScore=(team.defense+(10-team.conceded)*5)/2;
power+=Math.min(defenseScore,100)*0.08;
power+=Math.min(team.titles*3,15)*0.04;
const groupBonus=team.groupPosition===1?5:(team.groupPosition===2?2:0);
power+=groupBonus*0.03;
return Math.max(30,Math.min(98,power));
}

function getTeamScorers(teamName,numGoals){
const scorers=[];
const teamPlayers=Object.entries(TOP_SCORERS).filter(([name,data])=>data.team===teamName).sort((a,b)=>b[1].goals-a[1].goals);
for(let i=0;i<numGoals;i++){
const rand=Math.random();let selected;
if(teamPlayers.length===0){selected={name:"Jogador",goals:1};}
else if(rand<0.4&&teamPlayers[0]){selected={name:teamPlayers[0][0],goals:teamPlayers[0][1].goals};}
else if(rand<0.65&&teamPlayers[1]){selected={name:teamPlayers[1][0],goals:teamPlayers[1][1].goals};}
else if(rand<0.8&&teamPlayers[2]){selected={name:teamPlayers[2][0],goals:teamPlayers[2][1].goals};}
else{const randomIdx=Math.floor(Math.random()*teamPlayers.length);selected={name:teamPlayers[randomIdx][0],goals:teamPlayers[randomIdx][1].goals};}
scorers.push(selected.name);
}
return scorers;
}

function simulateMatch(homeTeam,awayTeam,round,matchId){
const homePower=calculateTeamPower(homeTeam);
const awayPower=calculateTeamPower(awayTeam);
const homeAdvantage=2;
const powerDiff=(homePower+homeAdvantage)-awayPower;
const homeAttackBase=TEAMS_DATA[homeTeam].attack/20;
const awayAttackBase=TEAMS_DATA[awayTeam].attack/20;
const randomFactor=()=>(Math.random()-0.5)*3;
let homeExpected=homeAttackBase+(powerDiff>0?powerDiff/15:powerDiff/25)+randomFactor();
let awayExpected=awayAttackBase+(powerDiff<0?-powerDiff/15:-powerDiff/25)+randomFactor();
homeExpected=Math.max(0.1,homeExpected);
awayExpected=Math.max(0.1,awayExpected);
const homeGoals=Math.round(homeExpected+(Math.random()*0.5));
const awayGoals=Math.round(awayExpected+(Math.random()*0.5));
let winner,loser;
if(homeGoals>awayGoals){winner=homeTeam;loser=awayTeam;}
else if(awayGoals>homeGoals){winner=awayTeam;loser=homeTeam;}
else{const homePenaltyPower=homePower+(Math.random()*10-5);const awayPenaltyPower=awayPower+(Math.random()*10-5);winner=homePenaltyPower>awayPenaltyPower?homeTeam:awayTeam;loser=winner===homeTeam?awayTeam:homeTeam;}
const homeScorers=getTeamScorers(homeTeam,homeGoals);
const awayScorers=getTeamScorers(awayTeam,awayGoals);
return{homeTeam,awayTeam,homeGoals,awayGoals,winner,loser,homeScorers,awayScorers,round,matchId};
}

function resolveSlot(slot){
if(!slot.startsWith("W")&&!slot.startsWith("L")){return{name:slot,flag:TEAMS_DATA[slot]?.flag||""};}
const isWin=slot.startsWith("W");const matchRef=slot.substring(1);
if(matchRef.length<=2){const matchId=parseInt(matchRef);const result=simulationState.roundOf32[matchId];if(result){const team=isWin?result.winner:result.loser;return{name:team,flag:TEAMS_DATA[team]?.flag||""};}}
if(matchRef.length===2){const matchId=parseInt(matchRef);const result=simulationState.roundOf16[matchId];if(result){const team=isWin?result.winner:result.loser;return{name:team,flag:TEAMS_DATA[team]?.flag||""};}}
if(matchRef.length===2||matchRef.length===3){const matchId=parseInt(matchRef);const result=simulationState.quarterFinals[matchId];if(result){const team=isWin?result.winner:result.loser;return{name:team,flag:TEAMS_DATA[team]?.flag||""};}}
if(matchRef.length===3){const matchId=parseInt(matchRef);const result=simulationState.semiFinals[matchId];if(result){const team=isWin?result.winner:result.loser;return{name:team,flag:TEAMS_DATA[team]?.flag||""};}}
return{name:"A DEFINIR",flag:""};
}

function createMatchCard(match,round){
const matchId=`${round}_${match.id}`;
const state=simulationState[round]?.[match.id];
let homeName=match.home||"A DEFINIR";
let awayName=match.away||"A DEFINIR";
let homeFlag="",awayFlag="";
let homeScore="-",awayScore="-";
let homeClass="",awayClass="";
let goalsHtml="";
if(match.homeSlot){const resolved=resolveSlot(match.homeSlot);homeName=resolved.name;homeFlag=resolved.flag;}
else if(match.home){homeFlag=TEAMS_DATA[match.home]?.flag||"";}
if(match.awaySlot){const resolved=resolveSlot(match.awaySlot);awayName=resolved.name;awayFlag=resolved.flag;}
else if(match.away){awayFlag=TEAMS_DATA[match.away]?.flag||"";}
if(state){homeScore=state.homeGoals;awayScore=state.awayGoals;homeClass=state.winner===homeName?"winner":"loser";awayClass=state.winner===awayName?"winner":"loser";
const homeGoalsList=state.homeScorers.map(s=>`<span class="goal-scorer">${s}</span>`).join("");
const awayGoalsList=state.awayScorers.map(s=>`<span class="goal-scorer">${s}</span>`).join("");
goalsHtml=`<div class="match-goals"><div>${homeName}: ${homeGoalsList||'-'}</div><div>${awayName}: ${awayGoalsList||'-'}</div></div>`;}
const simulatedClass=state?"simulated":"";
return `<div class="match-card ${simulatedClass} fade-in" id="${matchId}"><div class="match-number">PARTIDA ${match.match}</div><div class="team-row ${homeClass}" data-team="${homeName}"><img class="team-flag" src="${homeFlag}" alt="" onerror="this.style.display='none'"><span class="team-name">${homeName}</span><span class="team-score" id="score_${matchId}_home">${homeScore}</span></div><div class="team-row ${awayClass}" data-team="${awayName}"><img class="team-flag" src="${awayFlag}" alt="" onerror="this.style.display='none'"><span class="team-name">${awayName}</span><span class="team-score" id="score_${matchId}_away">${awayScore}</span></div>${goalsHtml}<div class="match-date">${match.date}</div></div>`;
}

function renderBracket(){
const left16=document.getElementById('colLeft16');
left16.innerHTML='<div class="bracket-column-title">32 AVOS</div>'+BRACKET_2026.roundOf32.slice(0,8).map(m=>createMatchCard(m,'roundOf32')).join('');
const right16=document.getElementById('colRight16');
right16.innerHTML='<div class="bracket-column-title">32 AVOS</div>'+BRACKET_2026.roundOf32.slice(8,16).map(m=>createMatchCard(m,'roundOf32')).join('');
const left8=document.getElementById('colLeft8');
left8.innerHTML='<div class="bracket-column-title">OITAVAS</div>'+BRACKET_2026.roundOf16.slice(0,4).map(m=>createMatchCard(m,'roundOf16')).join('');
const right8=document.getElementById('colRight8');
right8.innerHTML='<div class="bracket-column-title">OITAVAS</div>'+BRACKET_2026.roundOf16.slice(4,8).map(m=>createMatchCard(m,'roundOf16')).join('');
const left4=document.getElementById('colLeft4');
left4.innerHTML='<div class="bracket-column-title">QUARTAS</div>'+BRACKET_2026.quarterFinals.slice(0,2).map(m=>createMatchCard(m,'quarterFinals')).join('');
const right4=document.getElementById('colRight4');
right4.innerHTML='<div class="bracket-column-title">QUARTAS</div>'+BRACKET_2026.quarterFinals.slice(2,4).map(m=>createMatchCard(m,'quarterFinals')).join('');
const left2=document.getElementById('colLeft2');
left2.innerHTML='<div class="bracket-column-title">SEMIFINAL</div>'+BRACKET_2026.semiFinals.slice(0,1).map(m=>createMatchCard(m,'semiFinals')).join('');
const right2=document.getElementById('colRight2');
right2.innerHTML='<div class="bracket-column-title">SEMIFINAL</div>'+BRACKET_2026.semiFinals.slice(1,2).map(m=>createMatchCard(m,'semiFinals')).join('');
const finalMatch=document.getElementById('finalMatch');
finalMatch.innerHTML=BRACKET_2026.final.map(m=>createMatchCard(m,'final')).join('');

}

function setupTooltips(){
const tooltip=document.getElementById('teamTooltip');
const rows=document.querySelectorAll('.team-row[data-team]');
rows.forEach(row=>{
row.addEventListener('mouseenter',(e)=>{
const teamName=row.getAttribute('data-team');
if(teamName==="A DEFINIR"||!TEAMS_DATA[teamName])return;
const team=TEAMS_DATA[teamName];const power=calculateTeamPower(teamName).toFixed(1);
tooltip.innerHTML=`<div class="tooltip-title">${teamName}</div><div class="tooltip-stat"><span class="tooltip-stat-label">Ranking FIFA:</span><span class="tooltip-stat-value">#${team.ranking}</span></div><div class="tooltip-stat"><span class="tooltip-stat-label">Odds:</span><span class="tooltip-stat-value">${team.odds.toFixed(2)}</span></div><div class="tooltip-stat"><span class="tooltip-stat-label">Titulos:</span><span class="tooltip-stat-value">${team.titles}</span></div><div class="tooltip-stat"><span class="tooltip-stat-label">Forca:</span><span class="tooltip-stat-value">${power}</span></div><div class="tooltip-stat"><span class="tooltip-stat-label">Ataque:</span><span class="tooltip-stat-value">${team.attack}</span></div><div class="tooltip-stat"><span class="tooltip-stat-label">Defesa:</span><span class="tooltip-stat-value">${team.defense}</span></div><div class="tooltip-stat"><span class="tooltip-stat-label">Meio:</span><span class="tooltip-stat-value">${team.midfield}</span></div><div class="tooltip-stat"><span class="tooltip-stat-label">Gols na Copa:</span><span class="tooltip-stat-value">${team.goalsInWC}</span></div><div class="tooltip-stat"><span class="tooltip-stat-label">Sofridos:</span><span class="tooltip-stat-value">${team.conceded}</span></div><div class="tooltip-players"><div class="tooltip-players-title">DESTAQUES</div>${team.starPlayers.slice(0,4).map(p=>`<div>${p}</div>`).join('')}</div>`;
tooltip.classList.add('active');
});
row.addEventListener('mousemove',(e)=>{tooltip.style.left=(e.clientX+15)+'px';tooltip.style.top=(e.clientY+15)+'px';});
row.addEventListener('mouseleave',()=>{tooltip.classList.remove('active');});
});
}

async function simulateTournament(){
if(simulationState.isSimulated){resetBracket();}
const btn=document.getElementById('btnSimulate');
const logContainer=document.getElementById('simLogContainer');
const logEl=document.getElementById('simLog');
const progressEl=document.getElementById('simProgress');
const loading=document.getElementById('loadingOverlay');
btn.disabled=true;
loading.classList.add('active');
logContainer.classList.add('active');
logEl.innerHTML='';
initState();
const addLog=(text,type='')=>{const entry=document.createElement('div');entry.className=`log-entry ${type}`;entry.textContent=text;logEl.appendChild(entry);logEl.scrollTop=logEl.scrollHeight;};
const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));

addLog("=== INICIANDO SIMULACAO DA COPA DO MUNDO ===","highlight");
addLog(`Data: ${new Date().toLocaleString('pt-BR')}`);
addLog("Analisando dados de 32 selecoes...");
await sleep(500);

for(let i=0;i<BRACKET_2026.roundOf32.length;i++){
const match=BRACKET_2026.roundOf32[i];
const result=simulateMatch(match.home,match.away,'roundOf32',match.id);
simulationState.roundOf32[match.id]=result;
const progress=Math.round(((i+1)/BRACKET_2026.roundOf32.length)*15);
progressEl.textContent=`${progress}%`;
addLog(`[32 AVOS] ${match.home} ${result.homeGoals} x ${result.awayGoals} ${match.away} - Vencedor: ${result.winner}`);
if(result.homeGoals>0)addLog(`  Gols ${match.home}: ${result.homeScorers.join(', ')}`,'goal');
if(result.awayGoals>0)addLog(`  Gols ${match.away}: ${result.awayScorers.join(', ')}`,'goal');
renderBracket();
await sleep(200);
}

addLog("","");addLog("=== FASE 32 AVOS CONCLUIDA ===","highlight");await sleep(300);
addLog("","");addLog("=== OITAVAS DE FINAL ===","highlight");

for(let i=0;i<BRACKET_2026.roundOf16.length;i++){
const match=BRACKET_2026.roundOf16[i];
const homeResolved=resolveSlot(match.homeSlot).name;
const awayResolved=resolveSlot(match.awaySlot).name;
if(homeResolved==="A DEFINIR"||awayResolved==="A DEFINIR")continue;
const result=simulateMatch(homeResolved,awayResolved,'roundOf16',match.id);
simulationState.roundOf16[match.id]=result;
const progress=15+Math.round(((i+1)/BRACKET_2026.roundOf16.length)*20);
progressEl.textContent=`${progress}%`;
addLog(`[OITAVAS] ${homeResolved} ${result.homeGoals} x ${result.awayGoals} ${awayResolved} - Vencedor: ${result.winner}`);
if(result.homeGoals>0)addLog(`  Gols ${homeResolved}: ${result.homeScorers.join(', ')}`,'goal');
if(result.awayGoals>0)addLog(`  Gols ${awayResolved}: ${result.awayScorers.join(', ')}`,'goal');
renderBracket();
await sleep(300);
}

addLog("","");addLog("=== FASE OITAVAS CONCLUIDA ===","highlight");await sleep(300);
addLog("","");addLog("=== QUARTAS DE FINAL ===","highlight");

for(let i=0;i<BRACKET_2026.quarterFinals.length;i++){
const match=BRACKET_2026.quarterFinals[i];
const homeResolved=resolveSlot(match.homeSlot).name;
const awayResolved=resolveSlot(match.awaySlot).name;
if(homeResolved==="A DEFINIR"||awayResolved==="A DEFINIR")continue;
const result=simulateMatch(homeResolved,awayResolved,'quarterFinals',match.id);
simulationState.quarterFinals[match.id]=result;
const progress=35+Math.round(((i+1)/BRACKET_2026.quarterFinals.length)*20);
progressEl.textContent=`${progress}%`;
addLog(`[QUARTAS] ${homeResolved} ${result.homeGoals} x ${result.awayGoals} ${awayResolved} - Vencedor: ${result.winner}`);
if(result.homeGoals>0)addLog(`  Gols ${homeResolved}: ${result.homeScorers.join(', ')}`,'goal');
if(result.awayGoals>0)addLog(`  Gols ${awayResolved}: ${result.awayScorers.join(', ')}`,'goal');
renderBracket();
await sleep(400);
}

addLog("","");addLog("=== FASE QUARTAS CONCLUIDA ===","highlight");await sleep(300);
addLog("","");addLog("=== SEMIFINAIS ===","highlight");

for(let i=0;i<BRACKET_2026.semiFinals.length;i++){
const match=BRACKET_2026.semiFinals[i];
const homeResolved=resolveSlot(match.homeSlot).name;
const awayResolved=resolveSlot(match.awaySlot).name;
if(homeResolved==="A DEFINIR"||awayResolved==="A DEFINIR")continue;
const result=simulateMatch(homeResolved,awayResolved,'semiFinals',match.id);
simulationState.semiFinals[match.id]=result;
const progress=55+Math.round(((i+1)/BRACKET_2026.semiFinals.length)*20);
progressEl.textContent=`${progress}%`;
addLog(`[SEMIFINAL] ${homeResolved} ${result.homeGoals} x ${result.awayGoals} ${awayResolved} - Vencedor: ${result.winner}`);
if(result.homeGoals>0)addLog(`  Gols ${homeResolved}: ${result.homeScorers.join(', ')}`,'goal');
if(result.awayGoals>0)addLog(`  Gols ${awayResolved}: ${result.awayScorers.join(', ')}`,'goal');
renderBracket();
await sleep(500);
}

addLog("","");addLog("=== SEMIFINAIS CONCLUIDAS ===","highlight");await sleep(300);
addLog("","");addLog("=== DISPUTA DE TERCEIRO LUGAR ===","highlight");

const thirdMatch=BRACKET_2026.thirdPlace[0];
const thirdHome=resolveSlot(thirdMatch.homeSlot).name;
const thirdAway=resolveSlot(thirdMatch.awaySlot).name;
if(thirdHome!=="A DEFINIR"&&thirdAway!=="A DEFINIR"){
const result=simulateMatch(thirdHome,thirdAway,'thirdPlace',thirdMatch.id);
simulationState.thirdPlace[thirdMatch.id]=result;
simulationState.thirdPlaceTeam=result.winner;
addLog(`[3o LUGAR] ${thirdHome} ${result.homeGoals} x ${result.awayGoals} ${thirdAway} - 3o: ${result.winner}`);
if(result.homeGoals>0)addLog(`  Gols ${thirdHome}: ${result.homeScorers.join(', ')}`,'goal');
if(result.awayGoals>0)addLog(`  Gols ${thirdAway}: ${result.awayScorers.join(', ')}`,'goal');
}
await sleep(300);

addLog("","");addLog("=== FINAL DA COPA DO MUNDO ===","winner");
const finalMatch=BRACKET_2026.final[0];
const finalHome=resolveSlot(finalMatch.homeSlot).name;
const finalAway=resolveSlot(finalMatch.awaySlot).name;
if(finalHome!=="A DEFINIR"&&finalAway!=="A DEFINIR"){
const result=simulateMatch(finalHome,finalAway,'final',finalMatch.id);
simulationState.final[finalMatch.id]=result;
simulationState.champion=result.winner;
simulationState.runnerUp=result.loser;
addLog(`[FINAL] ${finalHome} ${result.homeGoals} x ${result.awayGoals} ${finalAway}`,"winner");
if(result.homeGoals>0)addLog(`  Gols ${finalHome}: ${result.homeScorers.join(', ')}`,'goal');
if(result.awayGoals>0)addLog(`  Gols ${finalAway}: ${result.awayScorers.join(', ')}`,'goal');
addLog("","");addLog(`>>> CAMPEAO DO MUNDO: ${result.winner} <<<`,"winner");
showChampion(result.winner);
}

progressEl.textContent="100%";
simulationState.isSimulated=true;
showStats();
loading.classList.remove('active');
btn.disabled=false;
addLog("","");addLog("=== SIMULACAO CONCLUIDA ===","highlight");
}

function showChampion(teamName){
const display=document.getElementById('championDisplay');
const flag=document.getElementById('championFlag');
const name=document.getElementById('championName');
const stats=document.getElementById('championStats');
const team=TEAMS_DATA[teamName];if(!team)return;
flag.src=team.flag;
name.textContent=teamName.toUpperCase();
stats.textContent=`${team.titles+1} TITULO MUNDIAL | FORCA: ${calculateTeamPower(teamName).toFixed(1)} | RANKING: #${team.ranking}`;
display.classList.add('active');
}

function showStats(){
const panel=document.getElementById('statsPanel');
const grid=document.getElementById('statsGrid');
let totalGoals=0,totalMatches=0;
const scorers={};
let biggestWin={diff:0,match:""};
const processRound=(roundData)=>{
Object.values(roundData).forEach(m=>{
totalGoals+=m.homeGoals+m.awayGoals;totalMatches++;
if(m.homeScorers)m.homeScorers.forEach(s=>{scorers[s]=(scorers[s]||0)+1;});
if(m.awayScorers)m.awayScorers.forEach(s=>{scorers[s]=(scorers[s]||0)+1;});
const diff=Math.abs(m.homeGoals-m.awayGoals);
if(diff>biggestWin.diff){biggestWin={diff,match:`${m.homeTeam} ${m.homeGoals} x ${m.awayGoals} ${m.awayTeam}`};}
});
};
processRound(simulationState.roundOf32);
processRound(simulationState.roundOf16);
processRound(simulationState.quarterFinals);
processRound(simulationState.semiFinals);
processRound(simulationState.final);
processRound(simulationState.thirdPlace);
const topScorer=Object.entries(scorers).sort((a,b)=>b[1]-a[1])[0];
const topScorerTeam=topScorer?TOP_SCORERS[topScorer[0]]?.team||"":"";
grid.innerHTML=`<div class="stat-item"><div class="stat-label">Total de Jogos</div><div class="stat-value">${totalMatches}</div></div><div class="stat-item"><div class="stat-label">Total de Gols</div><div class="stat-value green">${totalGoals}</div></div><div class="stat-item"><div class="stat-label">Media de Gols</div><div class="stat-value yellow">${(totalGoals/totalMatches).toFixed(2)}</div></div><div class="stat-item"><div class="stat-label">Artilheiro</div><div class="stat-value">${topScorer?topScorer[0]:'-'}</div><div style="font-size:0.65rem;color:var(--text-dim)">${topScorer?topScorer[1]+' gols':''} ${topScorerTeam?'('+topScorerTeam+')':''}</div></div><div class="stat-item"><div class="stat-label">Maior Goleada</div><div class="stat-value red">${biggestWin.diff} gols</div><div style="font-size:0.65rem;color:var(--text-dim)">${biggestWin.match}</div></div><div class="stat-item"><div class="stat-label">Campeao</div><div class="stat-value yellow">${simulationState.champion||'-'}</div></div>`;
panel.classList.add('active');
}

function resetBracket(){
initState();
document.getElementById('championDisplay').classList.remove('active');
document.getElementById('statsPanel').classList.remove('active');
document.getElementById('simLogContainer').classList.remove('active');
document.getElementById('simLog').innerHTML='';
renderBracket();
}

function updateBracket(){
const yearEl=document.getElementById('currentYear');
const current=parseInt(yearEl.textContent);
const next=current===CURRENT_YEAR?NEXT_YEAR:CURRENT_YEAR;
yearEl.textContent=next;
resetBracket();
const logEl=document.getElementById('simLog');
const logContainer=document.getElementById('simLogContainer');
logContainer.classList.add('active');
const entry=document.createElement('div');entry.className='log-entry highlight';entry.textContent=`Chaveamento atualizado para Copa do Mundo ${next}`;logEl.appendChild(entry);
const entry2=document.createElement('div');entry2.className='log-entry';entry2.textContent=`Dados carregados em tempo real para edicao ${next}`;logEl.appendChild(entry2);
}

window.addEventListener('DOMContentLoaded',()=>{initState();renderBracket();});
</script>
